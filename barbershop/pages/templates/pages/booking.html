{% extends "base.html" %}

{% block content %}
<section class="form-section form-section-spaced">
    <h2>Онлайн-запись</h2>
    <form method="post" class="auth-form auth-form-spaced">
        {% csrf_token %}
        {% if form.non_field_errors %}
            <p class="form-errors">{{ form.non_field_errors }}</p>
        {% endif %}
        {{ form.as_p }}
        <div class="btn-row profile-actions">
            <button type="submit" class="btn btn-primary">Записаться</button>
        </div>
    </form>
</section>
{% endblock %}

{% block extra_js %}
<script>
(function () {
    var serviceSelect = document.getElementById("id_service");
    var masterSelect = document.getElementById("id_master");
    if (!serviceSelect) return;

    serviceSelect.addEventListener("change", function () {
        var params = new URLSearchParams();
        if (serviceSelect.value) {
            params.set("service", serviceSelect.value);
        }
        if (masterSelect && masterSelect.value) {
            params.set("master", masterSelect.value);
        }
        var query = params.toString();
        window.location = "{% url 'pages:booking' %}" + (query ? "?" + query : "");
    });

    if (masterSelect) {
        masterSelect.addEventListener("change", function () {
            var params = new URLSearchParams();
            if (serviceSelect.value) {
                params.set("service", serviceSelect.value);
            }
            if (masterSelect.value) {
                params.set("master", masterSelect.value);
            }
            var query = params.toString();
            window.location = "{% url 'pages:booking' %}" + (query ? "?" + query : "");
        });
    }
})();
</script>
{% endblock %}
