{% extends "base.html" %}

{% block content %}
<section class="form-section form-section-spaced">
    <h2>Редактирование комментария</h2>
    <p class="booking-hint">
        {{ comment.user.username }} · {{ comment.master.full_name }} ·
        {{ comment.created_at|date:"d.m.Y H:i" }}
    </p>
    <form method="post" class="auth-form auth-form-spaced">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="btn-row profile-actions">
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a href="{% url 'pages:master_detail' comment.master.pk %}" class="btn btn-outline">Отмена</a>
        </div>
    </form>
</section>
{% endblock %}
