{% extends "base.html" %}

{% block content %}
<section class="form-section form-section-wide">
    <h2>Редактирование записи #{{ appointment.id }}</h2>
    <form method="post" class="auth-form">
        {% csrf_token %}
        {% if form.non_field_errors %}
            <p class="form-errors">{{ form.non_field_errors }}</p>
        {% endif %}
        {{ form.as_p }}
        <div class="btn-row">
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a href="{% url 'pages:admin_appointments' %}" class="btn btn-outline">Назад</a>
        </div>
    </form>
</section>
{% endblock %}
