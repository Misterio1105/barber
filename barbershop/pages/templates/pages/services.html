{% extends "base.html" %}

{% block content %}
<h2>Услуги</h2>

<form method="get" class="filters-form">
    <input type="number" name="min_price" placeholder="Цена от" value="{{ filters.min_price|default:'' }}" class="form-control" step="0.01">
    <input type="number" name="max_price" placeholder="Цена до" value="{{ filters.max_price|default:'' }}" class="form-control" step="0.01">
    <select name="sort" class="form-control">
        <option value="name" {% if filters.sort == "name" %}selected{% endif %}>По названию</option>
        <option value="price_asc" {% if filters.sort == "price_asc" %}selected{% endif %}>Цена ↑</option>
        <option value="price_desc" {% if filters.sort == "price_desc" %}selected{% endif %}>Цена ↓</option>
        <option value="duration" {% if filters.sort == "duration" %}selected{% endif %}>По длительности</option>
    </select>
    <button type="submit" class="btn btn-secondary">Применить</button>
    <a href="{% url 'pages:services' %}" class="btn btn-outline">Сбросить</a>
</form>

<div class="card-grid">
    {% for service in services %}
        {% include "pages/_service_card.html" with service=service %}
    {% empty %}
        <p>По вашему запросу услуги не найдены.</p>
    {% endfor %}
</div>
{% endblock %}
